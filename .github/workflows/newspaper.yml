name: 📰 ニュース自動配信

on:
  # 定時配信は AWS (Lambda + EventBridge Rule, 7:00 JST) に移行済み。
  # 二重配信を避けるため schedule は無効化。手動バックアップとして dispatch のみ残す。
  # schedule:
  #   # 朝刊: 毎朝 7:00 JST (= 22:00 UTC)
  #   - cron: '0 22 * * *'
  #   # 夕刊: 毎夕 19:00 JST (= 10:00 UTC)
  #   # - cron: '0 10 * * *'
  workflow_dispatch:  # 手動実行ボタン（AWS障害時のバックアップ用）

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: newspaper-${{ github.event.schedule || github.run_id }}
  cancel-in-progress: false

jobs:
  deliver:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: ニュース取得・要約・メール送信
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python src/main.py
